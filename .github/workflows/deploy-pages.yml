name: Deploy portfolio to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Validate JavaScript
        run: |
          node --check app.js
          node --check data.js

      - name: Prepare static site
        run: |
          mkdir -p out/assets
          cp index.html 404.html styles.css app.js data.js robots.txt sitemap.xml out/
          cp assets/girl-walk.png assets/hero-illustration.png out/assets/
          for path in about news works contact; do
            mkdir -p "out/$path"
            cp index.html "out/$path/index.html"
          done
          for slug in uiux-question marugoto-festival hanabi shiwashiwa-newspaper secom-interview ivs-toryumon; do
            mkdir -p "out/works/$slug"
            cp index.html "out/works/$slug/index.html"
          done
          for slug in ivs-2026; do
            mkdir -p "out/news/$slug"
            cp index.html "out/news/$slug/index.html"
          done
          touch out/.nojekyll

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./out

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to Pages
        id: deployment
        uses: actions/deploy-pages@v4
